apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: gateway-service
  description: gateway
  annotations:
    github.com/project-slug: backstage-demo-app/gateway-service
    backstage.io/techdocs-ref: dir:.
  links:
    - title: GitHub Repository
      url: https://github.com/backstage-demo-app/gateway-service
      icon: github
spec:
  type: service
  lifecycle: experimental
  owner: group:default/stargate
  system: system:default/demo-platform
  providesApis:
    - gateway-service-api
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: gateway-service-api
  description: REST API provided by gateway-service
  tags:
    - rest
    - java
    - spring-boot
spec:
  type: openapi
  lifecycle: experimental
  owner: group:default/stargate
  system: system:default/demo-platform
  definition:
    $text: http://localhost:8080/v3/api-docs.yaml
